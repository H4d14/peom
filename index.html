<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/styles.css" />

    <title>AI French Poem Generator</title>
  </head>

  <body>
    <div class="container">
      <header>
        <h1>AI French Poem Generator</h1>
      </header>

      <main>
        <form id="poem-generator-form">
          <input
            type="text"
            id="user-instructions"
            class="instructions"
            placeholder="Enter the topic of the French poem here"
            autocomplete="off"
            required
            autofocus
          />

          <input type="submit" class="submit-button" value="submit" />
        </form>

        <div class="poem" id="poem"></div>
      </main>

      <footer>
        <p>
          This project was coded by
          <a href="https://github.com/H4d14" target="_blank">Hadia Amin</a>
          and is on
          <a href="https://github.com/H4d14/peom" target="_blank">GitHub</a>
          and hosted on Netlify
        </p>
      </footer>
    </div>

    <script src="/src/index.js"></script>
  </body>
</html>
